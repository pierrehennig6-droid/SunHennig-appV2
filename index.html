function rate(p){if(p<=100)return 30;if(p<=500)return 17;if(p<=1500)return 13;if(p<=3000)return 11;if(p<=5000)return 10;return 8.5}

function calc(){
 const panelsEl=document.getElementById('panels');
 const kmEl=document.getElementById('km');
 const costEl=document.getElementById('cost');
 const etaEl=document.getElementById('eta');
 const decisionEl=document.getElementById('decision');

 let p=+panelsEl.value||0;
 let km=+kmEl.value||0;
 let cost=+costEl.value||0;
 let r=rate(p);
 let rev=p*r;
 let travel=km*3;   //traveling
 let profit=rev-cost-travel;
 let eta=p/150;     //panels per hour
 let pph=profit/(eta||1);

 setVal('rate',r);
 setVal('rev',rev);
 setVal('travel',travel);
 setVal('profit',profit);
 setVal('pph',pph);
 etaEl.innerText=eta.toFixed(1)+'h';
 decisionEl.innerText=pph<300?'❌ REJECT':'✅ ACCEPT';
}

function setVal(id,v){document.getElementById(id).innerText='R '+Math.round(v)}

async function saveJob(){

  const { data: sessionData } = await supabaseClient.auth.getSession();

 let job = {
   panels: document.getElementById('panels').value,

 const { data } = await supabaseClient.from('jobs').select('*');
 jobsCache = data || [];

function renderJobsUI(data){
 let revSum = 0;
 let profitSum = 0;
 let html = '';
 let daily = {};
 let monthly = {};

 data.forEach(function(j){
   let revNum = parseInt((j.revenue || '0').replace(/\D/g,'')) || 0;
   let profitNum = parseInt((j.profit || '0').replace(/\D/g,'')) || 0;

   revSum += revNum;
   profitSum += profitNum;

   let d = new Date(j.created_at || Date.now());
   let dayKey = d.toISOString().slice(0,10);
   let monthKey = d.getFullYear() + "-" + (d.getMonth()+1);

   daily[dayKey] = (daily[dayKey] || 0) + profitNum;
   monthly[monthKey] = (monthly[monthKey] || 0) + profitNum;

   html += "<div class='card'>" + j.panels + " panels | " + j.profit + "</div>";
 });

 document.getElementById('d_jobs').innerText = data.length;
 document.getElementById('d_rev').innerText = 'R ' + revSum;
 document.getElementById('d_profit').innerText = 'R ' + profitSum;

 html += "<div class='card'><b>📊 Company Stats</b><br>";

 Object.keys(daily).slice(-5).forEach(function(d){
   html += d + ": R" + daily[d] + "<br>";
 });

 html += "<br>";

 Object.keys(monthly).slice(-3).forEach(function(m){
   html += m + ": R" + monthly[m] + "<br>";
 });

 html += "</div>";

 document.getElementById('jobList').innerHTML = html;
}

async function addToSchedule(){
   const { data: sessionData } = await supabaseClient.auth.getSession();
   if(!sessionData.session){
    alert("Not authenticated");
    return;
  }

 let panelsVal = document.getElementById('panels').value;

   panels: panelsVal,
   eta: parseFloat(document.getElementById('eta').innerText) || 0,
   profit: parseInt(document.getElementById('profit').innerText.replace(/\D/g,'')) || 0,
   date: '',
   time: ''
 };

   queueOffline({type:'schedule', data:job});
   alert('⚠️ Offline — queued');
   return;
 }

 await supabaseClient.from('schedule').insert([job]);

 loadScheduleFromCloud(true);
}

async function autoSchedule(){
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session){
    alert("Not authenticated");
    return;
  }
 const { data: scheduleData } = await supabaseClient.from('schedule').select('*');

 let date = new Date();

 for (let j of scheduleData){

   do{
     date.setDate(date.getDate()+1);
   } while(date.getDay() === 0 || date.getDay() === 6);

   let newDate = date.toISOString().split('T')[0];

   await supabaseClient
     .from('schedule')
     .update({ date: newDate, time: '08:00' })
     .eq('id', j.id);
 }

 loadScheduleFromCloud(true);
}

async function updateSchedule(index, field, value){
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session){
    alert("Not authenticated");
    return;
  }
 const { data: scheduleData } = await supabaseClient.from('schedule').select('*');

 let job = scheduleData[index];
 if(!job) return;

 job[field] = value;

 if(job.time){
   let t = job.time.split(':');
   job.start = (+t[0]) + (+t[1]/60);
   job.end = job.start + (job.eta || 0);
 }

 await supabaseClient
   .from('schedule')
   .update(job)
   .eq('id', job.id);

 loadScheduleFromCloud(true);
}

// DISTANCE
function calcDistance(){
 if(!navigator.geolocation){
   alert('GPS not supported');
   return;
 }

 let destination = document.getElementById('clientAddress').value;

 if(!destination || destination.trim() === ""){
   alert("Enter client address first");
   return;
 }

 navigator.geolocation.getCurrentPosition(function(pos){

   let origin = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
   let service = new google.maps.DistanceMatrixService();

   service.getDistanceMatrix({
     origins: [origin],
     destinations: [destination],
     travelMode: 'DRIVING'
   }, function(res, status){

     if(status !== 'OK'){
       alert('Distance error');
       return;
     }

     let element = res.rows[0].elements[0];

     // 🔥 CRITICAL SAFETY CHECK
     if(!element || element.status !== "OK"){
       alert("Invalid or unreachable address");
       return;
     }

     let d = element.distance.value / 1000;

     document.getElementById('km').value = d.toFixed(1);
     calc();
   });

 });
}

  function hasConflict(list, index){
 let job = list[index];
 if(!job.date || !job.start) return false;

 return list.some((j,i)=>{
   if(i === index) return false;
   if(j.date !== job.date) return false;

   return (job.start < j.end && job.end > j.start);
 });
}
  function dailyLoad(list, date){
 return list
   .filter(j => j.date === date)
   .reduce((sum, j) => sum + (j.eta || 0), 0);
}
  function moveJob(index, direction){
 let list = JSON.parse(localStorage.getItem('schedule') || '[]');
 let job = list[index];

 if(!job.date) return;

 let d = new Date(job.date);
 d.setDate(d.getDate() + direction);

 job.date = d.toISOString().split('T')[0];

 localStorage.setItem('schedule', JSON.stringify(list));
 renderSchedule();
}

function initRealtime(){

 supabaseClient
   .channel('realtime-jobs')
   .on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' }, () => {
     loadJobsFromCloud(true);
   })
   .subscribe();

   .channel('realtime-clients')

     loadClientsFromCloud(true);
   })
   .subscribe();

 supabaseClient
   .channel('realtime-schedule')
   .on('postgres_changes', { event: '*', schema: 'public', table: 'schedule' }, () => {
     loadScheduleFromCloud(true);
   })
   .subscribe();

  let offlineQueue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');

function queueOffline(action){
 offlineQueue.push(action);
 localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
}

async function processQueue(){

 if(!navigator.onLine) return;

 for(let action of offlineQueue){

   if(action.type === 'job'){
     await supabaseClient.from('jobs').insert([action.data]);
   }

   if(action.type === 'client'){
     await supabaseClient.from('clients').insert([action.data]);
   }

   if(action.type === 'schedule'){
     await supabaseClient.from('schedule').insert([action.data]);
   }
 }

 offlineQueue = [];
 localStorage.removeItem('offlineQueue');
}

  function registerPWA(){

 if('serviceWorker' in navigator){
   const blob = new Blob([`
  const CACHE_VERSION = 'app-v2';
  const STATIC_ASSETS = [
    '/',
  ];

  self.addEventListener('install', e => {
    self.skipWaiting();
    e.waitUntil(
      caches.open(CACHE_VERSION).then(cache => cache.addAll(STATIC_ASSETS))
    );
  });

  self.addEventListener('activate', e => {
    e.waitUntil(
      caches.keys().then(keys =>
        Promise.all(
          keys.map(k => {
            if (k !== CACHE_VERSION) return caches.delete(k);
          })
        )
      )
    );
  });

  self.addEventListener('fetch', e => {
    const req = e.request;

    // HTML → NETWORK FIRST (no stale UI)
    if (req.headers.get('accept').includes('text/html')) {
      e.respondWith(
        fetch(req)
          .then(res => {
            const clone = res.clone();
            caches.open(CACHE_VERSION).then(c => c.put(req, clone));
            return res;
          })
          .catch(() => caches.match(req))
      );
      return;
    }

    // ASSETS → CACHE FIRST
    e.respondWith(
      caches.match(req).then(res =>
        res || fetch(req).then(fetchRes => {
          const clone = fetchRes.clone();
          caches.open(CACHE_VERSION).then(c => c.put(req, clone));
          return fetchRes;
        })
      )
    );
  });
`], {type:'text/javascript'});

   const url = URL.createObjectURL(blob);
   navigator.serviceWorker.register(url);
 }

   btn.onclick = () => deferredPrompt.prompt();

   document.body.appendChild(btn);
 });
}
